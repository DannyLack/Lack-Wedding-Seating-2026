<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danny & Brooke — Wedding Seating</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #fffefb;
    --stone: #e8e2d9;
    --gold: #b8955a;
    --gold-light: #d4b37a;
    --gold-pale: #f5eddc;
    --deep: #2c2416;
    --mid: #6b5d4a;
    --muted: #9e8e7a;
    --rose: #c9847a;
    --rose-pale: #f8eeec;
    --sage: #7a9a82;
    --sage-pale: #edf3ee;
    --blue-pale: #edf0f5;
    --blue: #6b7fa0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--cream);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    color: var(--deep);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 56px 24px 40px;
    border-bottom: 1px solid var(--stone);
    background: var(--warm-white);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .header-eyebrow {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(42px, 7vw, 68px);
    letter-spacing: 0.02em;
    color: var(--deep);
    line-height: 1;
    margin-bottom: 10px;
  }
  header h1 em {
    font-style: italic;
    color: var(--gold);
  }
  .header-date {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 10px;
  }
  .header-divider {
    width: 48px;
    height: 1px;
    background: var(--gold-light);
    margin: 18px auto 0;
  }

  /* SEARCH */
  .search-section {
    background: var(--warm-white);
    border-bottom: 1px solid var(--stone);
    padding: 28px 24px;
    text-align: center;
  }
  .search-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .search-wrap {
    position: relative;
    max-width: 380px;
    margin: 0 auto;
  }
  .search-wrap input {
    width: 100%;
    padding: 12px 20px 12px 44px;
    border: 1px solid var(--stone);
    border-radius: 40px;
    background: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--deep);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    pointer-events: none;
  }
  .search-result {
    margin-top: 14px;
    font-size: 14px;
    color: var(--mid);
    min-height: 22px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    letter-spacing: 0.02em;
  }
  .search-result strong {
    font-weight: 500;
    color: var(--gold);
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--stone);
  }

  /* FLOOR PLAN */
  .floor-section { margin-bottom: 52px; }
  .floor-outer {
    background: var(--warm-white);
    border: 1px solid var(--stone);
    border-radius: 12px;
    padding: 24px;
    overflow-x: auto;
  }
  .floor-wrap {
    position: relative;
    width: 760px;
    height: 520px;
    margin: 0 auto;
  }
  .fixture {
    position: absolute;
    background: var(--stone);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }
  .table-btn {
    position: absolute;
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid var(--stone);
    background: var(--warm-white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: all 0.18s;
    padding: 4px 3px;
  }
  .table-btn:hover {
    border-color: var(--gold-light);
    background: var(--gold-pale);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(184,149,90,0.15);
  }
  .table-btn.active {
    border-color: var(--gold);
    background: var(--gold-pale);
    box-shadow: 0 0 0 3px rgba(184,149,90,0.18);
  }
  .t-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--deep);
    line-height: 1.1;
  }
  .t-sub {
    font-size: 9px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.2;
  }
  .table-btn.bridesmaids { background: var(--rose-pale); border-color: var(--rose); }
  .table-btn.bridesmaids:hover { background: #f0dbd8; }
  .table-btn.bridesmaids.active { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(201,132,122,0.18); }
  .table-btn.bridesmaids .t-num { color: var(--rose); }
  .table-btn.bg { background: var(--sage-pale); border-color: var(--sage); }
  .table-btn.bg:hover { background: #ddeae0; }
  .table-btn.bg.active { border-color: var(--sage); box-shadow: 0 0 0 3px rgba(122,154,130,0.18); }
  .table-btn.bg .t-num { color: var(--sage); }
  .table-btn.vendor { background: var(--blue-pale); border-color: var(--blue); }
  .table-btn.vendor:hover { background: #dde3ed; }
  .table-btn.vendor.active { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(107,127,160,0.18); }
  .table-btn.vendor .t-num { color: var(--blue); font-size: 10px; }
  .table-btn.vendor .t-sub { color: var(--blue); }
  .table-btn.sweetheart { background: #fdf0f0; border-color: #d4827a; border-width: 2px; }
  .table-btn.sweetheart:hover { background: #fae4e2; }
  .table-btn.sweetheart.active { box-shadow: 0 0 0 3px rgba(212,130,122,0.25); }
  .table-btn.sweetheart .t-num { color: #b05a54; font-style: italic; font-size: 11px; }
  .table-btn.sweetheart .t-sub { color: #c47a74; }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .leg-swatch {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    border: 1px solid;
    flex-shrink: 0;
  }

  /* GUEST PANEL */
  .guest-section { margin-bottom: 52px; }
  .guest-panel {
    background: var(--warm-white);
    border: 1px solid var(--stone);
    border-radius: 12px;
    overflow: hidden;
    min-height: 120px;
  }
  .guest-panel-header {
    padding: 18px 24px 16px;
    border-bottom: 1px solid var(--stone);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .guest-panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--deep);
  }
  .guest-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .guest-panel-empty {
    padding: 40px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .guest-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--stone);
  }
  .guest-card {
    background: var(--warm-white);
    padding: 14px 18px;
    transition: background 0.15s;
  }
  .guest-card:hover { background: var(--cream); }
  .guest-card.highlight { background: var(--gold-pale); }
  .g-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--deep);
    margin-bottom: 3px;
  }
  .g-meal {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .meal-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-chicken { background: #b8955a; }
  .dot-beef { background: #8a5a4a; }
  .dot-veg { background: #7a9a82; }
  .dot-kids { background: #6b7fa0; }
  .g-allergy {
    margin-top: 5px;
    font-size: 10px;
    color: var(--rose);
    background: var(--rose-pale);
    border-radius: 4px;
    padding: 3px 7px;
    display: inline-block;
    letter-spacing: 0.02em;
  }

  /* MEAL LEGEND */
  .meal-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    padding: 14px 24px;
    border-top: 1px solid var(--stone);
    background: var(--cream);
  }
  .ml-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ALL TABLES VIEW */
  .all-section {}
  .tables-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .table-card {
    background: var(--warm-white);
    border: 1px solid var(--stone);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .table-card:hover {
    border-color: var(--gold-light);
    box-shadow: 0 4px 20px rgba(184,149,90,0.1);
  }
  .table-card-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--stone);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tc-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--deep);
  }
  .tc-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .table-card-guests {
    padding: 10px 18px 14px;
  }
  .tc-name {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.8;
    letter-spacing: 0.02em;
  }
  .tc-allergy-flag {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: var(--rose);
    border-radius: 50%;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--stone);
  }
  .tab {
    padding: 10px 22px;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }
  .tab:hover:not(.active) { color: var(--mid); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  @media (max-width: 600px) {
    header { padding: 40px 16px 28px; }
    .floor-wrap { width: 540px; height: 370px; }
    .main { padding: 28px 16px 60px; }
    .tables-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<div class="main">

            <div class="ml-item"><span class="meal-dot dot-kids"></span>Kids meal</div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="tab-content" id="tab-alltables">
    <div class="section-title">All Tables</div>
    <div class="tables-grid" id="allTablesGrid"></div>
  </div>

</div>

function mealDotClass(meal) {
  if (meal.includes('piccata')) return 'dot-chicken';
  if (meal.includes('tenderloin')) return 'dot-beef';
  if (meal.includes('ravioli') || meal.includes('vegetarian')) return 'dot-veg';
  return 'dot-kids';
}
function mealShort(meal) {
  if (meal.includes('piccata')) return 'Chicken piccata';
  if (meal.includes('tenderloin')) return 'Chuck tenderloin';
  if (meal.includes('ravioli') || meal.includes('vegetarian')) return 'Caprese ravioli';
  if (meal.includes('tenders')) return 'Chicken tenders';
  if (meal.includes('pizza')) return 'Cheese pizza';
  return meal;
}

function showGuests(id, highlightName) {
  const d = DATA[id];
  document.getElementById('panelEmpty').style.display = 'none';
  document.getElementById('panelContent').style.display = 'block';
  document.getElementById('panelTitle').textContent = d.label;
  document.getElementById('panelCount').textContent = d.guests.length + ' guests';
  const grid = document.getElementById('guestGrid');
  grid.innerHTML = '';
  d.guests.forEach(g => {
    const card = document.createElement('div');
    card.className = 'guest-card' + (highlightName && g.name.toLowerCase().includes(highlightName) ? ' highlight' : '');
    card.innerHTML = `<div class="g-name">${g.name}</div><div class="g-meal"><span class="meal-dot ${mealDotClass(g.meal)}"></span>${mealShort(g.meal)}</div>${g.allergy ? `<div class="g-allergy">⚠ ${g.allergy}</div>` : ''}`;
    grid.appendChild(card);
  });
}

});

// Search
const searchInput = document.getElementById('searchInput');
const searchResult = document.getElementById('searchResult');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) { searchResult.textContent = ''; return; }
  let found = null, foundId = null;
  for (const [id, d] of Object.entries(DATA)) {
    const g = d.guests.find(g => g.name.toLowerCase().includes(q));
    if (g) { found = g; foundId = id; break; }
  }
  if (found) {
    const d = DATA[foundId];
    searchResult.innerHTML = `<strong>${found.name}</strong> is seated at <strong>${d.label}</strong>`;
    showGuests(foundId, q);
    if (activeBtn) activeBtn.classList.remove('active');
    const allBtns = document.querySelectorAll('.table-btn');
    const idx = Object.keys(DATA).indexOf(foundId);
    if (allBtns[idx]) { allBtns[idx].classList.add('active'); activeBtn = allBtns[idx]; }
    document.querySelector('[data-tab="floorplan"]').click();
  } else if (q.length >= 3) {
    searchResult.textContent = 'No guest found with that name.';
  } else {
    searchResult.textContent = '';
  }
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});
